name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

  test:
    name: Test (pytest) — ${{ matrix.os }}, py${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxcb-xv0 \
            libxrender1 \
            xvfb

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run tests with coverage (Linux)
        if: runner.os == 'Linux'
        run: |
          xvfb-run --auto-servernum \
            python -m pytest tests/ \
              --cov=filepilot \
              --cov-report=xml:coverage.xml \
              --cov-report=term-missing \
              -v --tb=short

      - name: Run tests with coverage (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m pytest tests/ \
            --cov=filepilot \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -v --tb=short

      - name: Upload coverage report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}-${{ github.sha }}
          path: coverage.xml
          retention-days: 14

      - name: Upload coverage to Codecov
        if: runner.os == 'Linux' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        continue-on-error: true
        with:
          files: coverage.xml
          flags: unittests
          name: filepilot-codecov-upload
          fail_ci_if_error: false
          verbose: false

  build:
    name: Build (PyInstaller)
    runs-on: windows-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller FilePilot.spec

      - name: Verify build artifact exists
        run: |
          if (Test-Path "dist\FilePilot\FilePilot.exe") {
            Write-Host "✅ Build successful: dist\FilePilot\FilePilot.exe"
            $size = (Get-Item "dist\FilePilot\FilePilot.exe").Length
            Write-Host "📦 Size: $([math]::Round($size / 1MB, 2)) MB"
          } else {
            Write-Host "❌ Build artifact not found!"
            Get-ChildItem dist\ -Recurse -ErrorAction SilentlyContinue
            exit 1
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: FilePilot-Windows-${{ github.sha }}
          path: dist\FilePilot\
          retention-days: 7
