name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-qt

      - name: Run tests
        run: |
          python -m pytest tests/test_file_scanner.py tests/test_file_organizer.py -v --tb=short

      - name: Syntax check
        run: |
          python -c "
          import ast, os, sys
          errors = []
          for root, dirs, files in os.walk('filepilot'):
              dirs[:] = [d for d in dirs if d != '__pycache__']
              for f in files:
                  if not f.endswith('.py'): continue
                  path = os.path.join(root, f)
                  try:
                      with open(path) as fh: ast.parse(fh.read())
                  except SyntaxError as e: errors.append(f'{path}: {e}')
          if errors:
              for e in errors: print(f'ERROR: {e}')
              sys.exit(1)
          print(f'All Python files OK')
          "

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check filepilot/ --select E,F,W --ignore E501
